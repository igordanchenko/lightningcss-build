name: Lock

on:
  schedule:
    - cron: "17 9 * * 0"
  workflow_dispatch:

permissions:
  issues: write
  discussions: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  action:
    name: Lock
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository == 'igordanchenko/lightningcss-build'

    steps:
      - uses: dessant/lock-threads@1bf7ec25051fe7c00bdd17e6a7cf3d7bfb7dc771 # v5.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-lock-reason: ""
          issue-lock-reason: ""
          pr-inactive-days: "180"
          issue-inactive-days: "180"
          discussion-inactive-days: "180"
