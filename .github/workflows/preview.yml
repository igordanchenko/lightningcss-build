name: Preview

on:
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions: {}

jobs:
  preview:
    name: Publish preview package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository == 'igordanchenko/lightningcss-build'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint & Test
        run: npm run ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Prune package.json
        uses: igordanchenko/actions/prune-package-json@d460545dc978b327e8d2b2cfe0acb86075a660c1 # v1.3.2

      - name: Publish preview
        run: npx --yes -- pkg-pr-new publish --no-template
